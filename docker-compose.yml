services:
  mongo:
    image: mongo:latest
    container_name: mongo
    networks: [bookstore-net]
    volumes:
      - mongo-data:/data/db

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - MONGO_HOST=mongo
    ports: ["3000:3000"]
    depends_on: [mongo]
    networks: [bookstore-net]

  order-service:
    build: ./order-service
    container_name: order-service
    environment:
      - HOST=0.0.0.0
      - PORT=3001
      - MONGO_HOST=mongo
    ports: ["3001:3001"]
    depends_on: [mongo]
    networks: [bookstore-net]

  payment-service:
    build: ./payment-service
    container_name: payment-service
    environment:
      - HOST=0.0.0.0
      - PORT=3002
      - MONGO_HOST=mongo
    ports: ["3002:3002"]
    depends_on: [mongo]
    networks: [bookstore-net]

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    environment:
      - PORT=9001
      - INVENTORY_URL=http://inventory-service:3000
      - ORDERS_URL=http://order-service:3001
      - PAYMENTS_URL=http://payment-service:3002
    ports: ["9001:9001"]
    depends_on: [inventory-service, order-service, payment-service]
    networks: [bookstore-net]

  bookstore-web-app:
    build: ./bookstore-web-app
    container_name: bookstore-web-app
    environment:
      - PORT=8082
      - INVENTORY_API=http://api-gateway:9001/inventory/books
      - ORDER_API=http://api-gateway:9001/orders/orders
      - PAYMENT_API=http://api-gateway:9001/payments/payments
    ports: ["8082:8082"]
    depends_on: [api-gateway]
    networks: [bookstore-net]

networks:
  bookstore-net:
    driver: bridge

volumes:
  mongo-data: